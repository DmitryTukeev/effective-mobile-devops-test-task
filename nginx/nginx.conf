upstream backend_servers {
    # 'backend' - это имя сервиса из docker-compose.yml
    # 8080 - порт, который бэкенд слушает внутри контейнера
    server backend:8080; 
}

server {
    listen 80;
    server_name localhost;

    # Отключаем логирование запросов к favicon, чтобы не засорять логи
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location / {
        proxy_pass http://backend_servers;
        
        # Передача стандартных заголовков (Best Practice для reverse proxy)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
